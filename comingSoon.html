<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Coming Soon｜周子恒</title>
  <link rel="icon" href="images/icon.png" type="image/png">

  <style>
    :root {
      --bg: #f4efe7;
      --fg: #222222;
      --paper: #fffdf6;

      --blue: #2f6bff;
      --pink: #ff5c9a;
      --green: #12a889;
      --yellow: #ffd34d;

      --pad: clamp(22px, 4vw, 56px);
      --content-max: 1440px;
      --font: Inter, Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      font-family: var(--font);
      background:
        radial-gradient(circle at 68% 38%, rgba(17, 17, 17, 0.045), transparent 32%),
        radial-gradient(circle at 18% 82%, rgba(245, 200, 75, 0.12), transparent 30%),
        var(--bg);
      color: var(--fg);
      letter-spacing: -0.04em;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    ::selection {
      background: var(--fg);
      color: var(--bg);
    }

    /* =========================
       Page Background
    ========================= */
    .page {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;

      display: flex;
      flex-direction: column;
    }

    .noise {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      opacity: 0.045;

      background-image:
        linear-gradient(45deg, #000 25%, transparent 25%),
        linear-gradient(-45deg, #000 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #000 75%),
        linear-gradient(-45deg, transparent 75%, #000 75%);
      background-size: 6px 6px;
    }

    .grid-lines {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.18;

      background-image:
        linear-gradient(to right, rgba(34, 34, 34, 0.08) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(34, 34, 34, 0.08) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(circle at 62% 44%, #000 0%, transparent 74%);
    }

    /* =========================
       Topbar
    ========================= */
    .topbar {
      position: fixed;
      top: 28px;
      left: var(--pad);
      right: var(--pad);
      z-index: 20;

      display: flex;
      align-items: center;
      justify-content: space-between;

      font-size: 24px;
      font-weight: 950;
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .brand {
      cursor: pointer;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .top-link {
      opacity: 0.58;
      transition:
        opacity 0.2s ease,
        transform 0.2s ease;
    }

    .top-link:hover {
      opacity: 1;
      transform: translateY(-2px);
    }

    /* =========================
       Main
    ========================= */
    .main {
      position: relative;
      z-index: 5;

      flex: 1;
      min-height: 100vh;
      padding: 120px var(--pad) 80px;

      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .content {
      width: min(100%, 1080px);
      margin: 0 auto;
    }

    .kicker {
      margin-bottom: 18px;

      font-size: clamp(12px, 1vw, 18px);
      font-weight: 950;
      line-height: 1;
      letter-spacing: 0.16em;
      text-transform: uppercase;

      color: rgba(34, 34, 34, 0.52);
    }

    .title {
      font-size: clamp(64px, 11vw, 180px);
      line-height: 0.86;
      font-weight: 950;
      letter-spacing: -0.095em;
      text-transform: uppercase;

      color: var(--fg);
    }

    .title .accent {
      color: var(--blue);
    }

    .desc {
      max-width: 620px;
      margin: 26px auto 0;

      font-size: clamp(15px, 1.15vw, 20px);
      line-height: 1.58;
      font-weight: 650;
      letter-spacing: -0.035em;

      color: rgba(34, 34, 34, 0.62);
    }

    .actions {
      margin-top: 30px;

      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;

      min-height: 48px;
      padding: 10px 15px;

      border: 1.5px solid var(--fg);
      border-radius: 999px;

      background: rgba(255, 253, 246, 0.42);
      color: var(--fg);

      font-size: 18px;
      font-weight: 950;
      line-height: 1;
      white-space: nowrap;
      text-transform: uppercase;

      box-shadow: 0 4px 0 rgba(17, 17, 17, 0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);

      transform: translateY(0);
      transition:
        transform 0.2s cubic-bezier(.16, 1, .3, 1),
        box-shadow 0.2s cubic-bezier(.16, 1, .3, 1),
        background 0.2s ease,
        color 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 7px 0 rgba(17, 17, 17, 0.13);
      background: var(--yellow);
    }

    .btn.primary {
      background: var(--fg);
      color: var(--bg);
    }

    .btn.primary:hover {
      background: var(--blue);
      color: #ffffff;
    }

    /* =========================
       Footer
    ========================= */
    .footer {
      position: relative;
      z-index: 5;

      padding: 24px var(--pad) 32px;

      color: rgba(34, 34, 34, 0.52);

      font-size: 11px;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .footer-inner {
      width: min(100%, var(--content-max));
      margin: 0 auto;

      display: flex;
      justify-content: space-between;
      gap: 20px;
    }

    /* =========================
       Responsive
    ========================= */
    @media (max-width: 768px) {
      :root {
        --pad: 22px;
      }

      .topbar {
        top: 18px;
        font-size: 15px;
      }

      .top-actions {
        gap: 12px;
      }

      .main {
        padding-top: 96px;
        padding-bottom: 64px;
      }

      .title {
        font-size: clamp(54px, 17vw, 92px);
      }

      .desc {
        max-width: 330px;
        font-size: 13.5px;
        line-height: 1.52;
      }

      .actions {
        gap: 8px;
      }

      .btn {
        min-height: 36px;
        padding: 9px 13px;
        font-size: 11px;
        border-width: 1.4px;
        box-shadow: 0 3px 0 rgba(17, 17, 17, 0.08);
      }

      .footer-inner {
        flex-direction: column;
      }
    }

    @media (max-width: 430px) {
      :root {
        --pad: 18px;
      }

      .topbar {
        top: 16px;
        font-size: 13px;
      }

      .title {
        font-size: clamp(48px, 18vw, 76px);
      }

      .actions {
        width: 100%;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="grid-lines"></div>
    <div class="noise"></div>

    <!-- Topbar -->
    <header class="topbar">
      <a class="brand" href="index.html">周子恒</a>

      <nav class="top-actions">
        <a class="top-link" href="index.html">Map</a>
        <a class="top-link" href="index.html#works">Index</a>
        <a class="top-link" href="about.html">About</a>
      </nav>
    </header>

    <!-- Main -->
    <main class="main">
      <section class="content">
        <div class="kicker">Under Construction</div>

        <h1 class="title">
          Coming<br>
          <span class="accent">Soon</span>
        </h1>

        <p class="desc">
          页面正在整理中。
        </p>

        <div class="actions">
          <a class="btn primary" href="doc/简历.pdf" target="_blank" rel="noopener">查看简历</a>
          <a class="btn" href="mailto:zhou_ziheng1@outlook.com">联系我</a>
          <a class="btn" href="index.html">返回项目地图</a>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-inner">
        <div>© 2026 Zhou Ziheng Portfolio</div>
        <div>From Spatial Design to AI Product Systems</div>
      </div>
    </footer>
  </div>
</body>
</html>
